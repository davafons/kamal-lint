name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Intentionally NOT using bundler-cache on a tag-triggered publish job:
      # cache poisoning from a long-lived cache key could compromise the
      # released artifact. The release path is rare; pay the install cost.
      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: "3.3"

      - run: bundle install

      - name: Run tests
        run: bin/test

      - name: Build gem
        id: build
        run: |
          set -euo pipefail
          mkdir -p pkg
          version=$(ruby -r ./lib/kamal/lint/version -e 'print Kamal::Lint::VERSION')
          gem build kamal-lint.gemspec --output "pkg/kamal-lint-${version}.gem"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          ls -lh pkg/

      - name: Extract changelog section
        id: changelog
        env:
          VERSION: ${{ steps.build.outputs.version }}
        run: |
          set -euo pipefail
          body=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { in_section=1; next }
            in_section && $0 ~ "^## " { exit }
            in_section { print }
          ' CHANGELOG.md)
          {
            echo "body<<EOF_BODY"
            echo "$body"
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0

      - name: Push gem to RubyGems
        run: |
          set -euo pipefail
          for gem in pkg/*.gem; do
            echo "Pushing $gem"
            if out=$(gem push "$gem" 2>&1); then
              echo "$out"
            else
              if echo "$out" | grep -q "Repushing of gem versions is not allowed"; then
                echo "Already published, skipping: $gem"
              else
                echo "$out" >&2
                exit 1
              fi
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: v${{ steps.build.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: pkg/*.gem
          fail_on_unmatched_files: true
