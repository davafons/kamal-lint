name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run tests
        run: bin/test

      - name: Build gem
        run: |
          set -euo pipefail
          mkdir -p pkg
          version=$(ruby -r ./lib/kamal/lint/version -e 'print Kamal::Lint::VERSION')
          gem build kamal-lint.gemspec --output "pkg/kamal-lint-${version}.gem"
          ls -lh pkg/

      - uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Push gem to RubyGems
        run: |
          set -euo pipefail
          for gem in pkg/*.gem; do
            echo "Pushing $gem"
            if out=$(gem push "$gem" 2>&1); then
              echo "$out"
            else
              if echo "$out" | grep -q "Repushing of gem versions is not allowed"; then
                echo "Already published, skipping: $gem"
              else
                echo "$out" >&2
                exit 1
              fi
            fi
          done
