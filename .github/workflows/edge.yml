name: Edge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  edge:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set dev version
        run: |
          set -euo pipefail
          base_version=$(ruby -r ./lib/kamal/lint/version -e "puts Kamal::Lint::VERSION")
          date=$(date -u +%Y%m%d)
          sha=$(git rev-parse --short HEAD)
          dev_version="${base_version}.dev.${date}.${sha}"
          sed -i "s/VERSION = \".*\"/VERSION = \"${dev_version}\"/" lib/kamal/lint/version.rb
          echo "DEV_VERSION=${dev_version}" >> "$GITHUB_ENV"
          echo "Publishing edge version: ${dev_version}"

      - name: Run tests
        run: bin/test

      - name: Build edge gem
        run: |
          mkdir -p pkg
          gem build kamal-lint.gemspec --output "pkg/kamal-lint-${DEV_VERSION}.gem"

      - uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Push edge gem to RubyGems
        run: gem push "pkg/kamal-lint-${DEV_VERSION}.gem"
